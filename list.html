<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在跳转</title>
</head>
<body>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const target = String(params.get("part") || "").toLowerCase() === "reading"
        ? "reading/list.html"
        : "grammar/list.html";
      window.location.replace(`${target}${window.location.search || ""}`);
    }());
  </script>
  <p>正在跳转到新的列表页面。如果没有自动跳转，请手动打开 <a href="grammar/list.html">语法列表</a> 或 <a href="reading/list.html?level=A1&part=reading">阅读列表</a>。</p>
</body>
</html>
